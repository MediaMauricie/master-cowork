body{font-family:'Montserrat',sans-serif;background:#f0f0f0;color:#2d2d2d;font-size:14px;}

var _somData = null;
var _somId   = null;

function fmt(n){
  if(!n&&n!==0) return '—';
  return n.toLocaleString('fr-CA',{minimumFractionDigits:2,maximumFractionDigits:2})+' $';
}

async function chargerSoumission(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){ afficherErreur('Lien invalide.'); return; }
  _somId=id;
  try{
    var docRef=window._doc(window._db,'soumissions',id);
    var snap=await window._getDoc(docRef);
    if(!snap.exists()){ afficherErreur('Soumission introuvable.'); return; }
    _somData=snap.data();
    _somData._id=id;
    afficherSoumission(id,_somData);
  }catch(e){ afficherErreur('Erreur: '+e.message); }
}

function afficherErreur(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('content').innerHTML=
    '<div class="error-block">'+
    '<div style="font-size:32px;margin-bottom:12px;">⚠️</div>'+
    '<div style="font-size:15px;font-weight:700;color:#c0392b;margin-bottom:8px;">Oups!</div>'+
    '<div style="font-size:13px;color:#555;">'+msg+'</div>'+
    '</div>';
}

async function accepterSoumission(id){
  var nom   = document.getElementById('accept-nom').value.trim();
  var titre = document.getElementById('accept-titre').value.trim();
  if(!nom){ alert('Veuillez entrer votre nom complet.'); return; }

  var btn=document.getElementById('btn-accept');
  btn.disabled=true;
  btn.textContent='⏳ Traitement en cours...';

  // Étape 1 — Firebase update
  setStep(1);
  try{
    var docRef=window._doc(window._db,'soumissions',id);
    await window._updateDoc(docRef,{
      statut:      'acceptee',
      accepteePar: nom,
      accepteeTitre: titre,
      accepteeAt:  window._serverTimestamp()
    });
  }catch(e){
    btn.disabled=false;
    btn.textContent='✓ J\'approuve cette soumission';
    alert('Erreur de connexion: '+e.message+'. Veuillez réessayer.');
    return;
  }

  // Étape 2 — Générer PDF + appeler Apps Script
  setStep(2);
  btn.textContent='⏳ Création de votre dossier...';

  try{
    // Générer le PDF de la soumission
    var pdfBase64='';
    var nomFichier='';
    if(_somData && window.html2pdf){
      try{
        var element=document.getElementById('page-wrap');
        var opt={
          margin:[10,10,10,10],
          filename:'temp.pdf',
          image:{type:'jpeg',quality:0.92},
          html2canvas:{scale:1.5,useCORS:true,allowTaint:true,logging:false,imageTimeout:10000},
          jsPDF:{unit:'mm',format:'letter',orientation:'portrait'}
        };
        var pdfBlob=await html2pdf().set(opt).from(element).outputPdf('blob');
        var reader=new FileReader();
        pdfBase64=await new Promise(function(res){
          reader.onloadend=function(){res(reader.result.split(',')[1]);};
          reader.readAsDataURL(pdfBlob);
        });
        var cli=(_somData.client&&_somData.client.entreprise)||'client';
        nomFichier='Soumission-'+(_somData.noSoumission||id)+'-'+cli.replace(/\s+/g,'_')+'.pdf';
      }catch(e){ Logger && Logger.log('PDF gen error: '+e.message); }
    }

    // Appeler Apps Script
    var payload={
      action:       'accepterSoumission',
      token:        'MauricieMau20',
      leadId:       (_somData&&_somData.leadId)||'',
      clientNom:    (_somData&&_somData.client&&(_somData.client.entreprise||_somData.client.representant))||nom,
      clientEmail:  (_somData&&_somData.client&&_somData.client.courriel)||'',
      serviceNom:   (_somData&&_somData.serviceNom)||'',
      noSom:        (_somData&&_somData.noSoumission)||id,
      totalTTC:     (_somData&&_somData.facturation&&_somData.facturation.totalTTC)||0,
      acompte:      (_somData&&_somData.facturation&&_somData.facturation.acompte)||0,
      accepteePar:  nom+' ('+(titre||'—')+')',
      pdfBase64:    pdfBase64,
      nomFichier:   nomFichier
    };

    await fetch(SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){
    console.warn('Apps Script call error (non-bloquant):', e.message);
  }

  // Étape 3 — Confirmer
  setStep(3);
  document.getElementById('accepted-block').style.display='block';
  btn.style.display='none';
  document.getElementById('accept-nom').disabled=true;
  document.getElementById('accept-titre').disabled=true;

  // Télécharger le PDF pour le client aussi
  if(_somData){
    try{
      var cli2=(_somData.client&&_somData.client.entreprise)||'client';
      var fname='Soumission-'+(_somData.noSoumission||id)+'-'+cli2.replace(/\s+/g,'_')+'.pdf';
      html2pdf().set({
        margin:[10,10,10,10],
        filename:fname,
        image:{type:'jpeg',quality:0.92},
        html2canvas:{scale:1.5,useCORS:true,allowTaint:true,logging:false,imageTimeout:10000,
          onclone:function(doc){
            var az=doc.getElementById('accepted-block');
            if(az) az.style.display='block';
          }
        },
        jsPDF:{unit:'mm',format:'letter',orientation:'portrait'}
      }).from(document.getElementById('page-wrap')).save();
    }catch(e){}
  }
}

function setStep(n){
  for(var i=1;i<=3;i++){
    var el=document.getElementById('step-'+i);
    if(!el) continue;
    if(i<n) el.className='step done';
    else if(i===n) el.className='step active';
    else el.className='step';
  }
}

window.addEventListener('load',function(){
  setTimeout(chargerSoumission,300);
});
</script>
